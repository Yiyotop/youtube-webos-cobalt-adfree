name: CI

on:
  push:
    branches:
      - cobalt
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq git patch sed binutils squashfs-tools rename findutils xz-utils make

      - name: Check Makefile
        run: make help

      - name: Check required directories
        run: |
          test -d assets
          test -d cobalt-bin
          test -d cobalt-patches
          test -d webapp

      - name: Check no old youtube-webos app folder exists
        run: |
          test ! -d youtube-webos

      - name: Search old project references
        run: |
          ! grep -RIn "GuillaumeSmaha/youtube-webos-cobalt\|FriedChickenButt/youtube-webos\|cd youtube-webos\|webosbrew/youtube-webos" . --exclude-dir=.git
