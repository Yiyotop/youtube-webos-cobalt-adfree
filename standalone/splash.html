<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Cobalt</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0f0f0f;
        color: #fff;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .mark {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .play {
        width: 128px;
        height: 88px;
        border-radius: 24px;
        background: #ff0033;
        position: relative;
      }

      .play::after {
        content: "";
        position: absolute;
        top: 24px;
        left: 50px;
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        border-left: 32px solid #fff;
      }

      .title {
        font-size: 54px;
        font-weight: 700;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <div class="mark">
      <div class="play"></div>
      <div class="title">YouTube Cobalt</div>
    </div>
  </body>
</html>
